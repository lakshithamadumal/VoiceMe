<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loading Voice Me</title>
    <link rel="icon" href="/fav.png" />
    <style>
        :root {
            --red-1: #ff2d7a;
            --red-2: #ff4b3e;
            --orange: #ff6a1a;
            --bg: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            background: var(--bg);
            overflow: hidden;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .splash {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        .wave {
            display: flex;
            align-items: flex-end;
            gap: 16px;
        }

        .bar {
            width: 22px;
            border-radius: 999px;
            background: linear-gradient(180deg, var(--orange) 0%, var(--red-2) 48%, var(--red-1) 100%);
            transform-origin: center bottom;
            animation: pulse 1s ease-in-out infinite;
        }

        .bar:nth-child(1) { height: 54px; animation-delay: 0s; }
        .bar:nth-child(2) { height: 92px; animation-delay: 0.14s; }
        .bar:nth-child(3) { height: 68px; animation-delay: 0.28s; }
        .bar:nth-child(4) { height: 42px; animation-delay: 0.42s; }

        @keyframes pulse {
            0%, 100% {
                transform: scaleY(0.72);
                opacity: 0.52;
            }
            50% {
                transform: scaleY(1.16);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="splash" id="splash" aria-label="Loading Voice Me" aria-busy="true">
        <div class="wave" aria-hidden="true">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <script>
        (function () {
            function goHome() {
                window.location.replace('index.html?from=loading');
            }

            if (document.readyState === 'complete') {
                window.setTimeout(goHome, 1200);
                return;
            }

            window.addEventListener('load', function () {
                window.setTimeout(goHome, 1200);
            }, { once: true });
        })();
    </script>
</body>
</html>
